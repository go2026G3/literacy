<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>表の練習</title>

    <style>
        table {
            border-collapse: collapse;
            width: 400px;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: lightgray;
        }
    </style>
</head>
<body>

    <h1>成績表</h1>

    <table>
        <tr>
            <th>名前</th>
            <th>数学</th>
            <th>英語</th>
        </tr>

        <tr>
            <td>田中</td>
            <td>85</td>
            <td>90</td>
        </tr>

        <tr>
            <td>鈴木</td>
            <td>78</td>
            <td>88</td>
        </tr>
    </table>

</body>
</html>
